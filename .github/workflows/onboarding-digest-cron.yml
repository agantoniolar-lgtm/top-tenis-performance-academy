name: Onboarding Digest

on:
  schedule:
    # Lunes 7am CDMX = 13:00 UTC (México sin horario de verano desde 2022 en la mayoría del país)
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Solo imprimir el digest, no enviar emails'
        type: boolean
        default: false
      test_to:
        description: 'Si se llena, manda el digest SOLO a este email (no a todos los coaches) — para probar un envío real'
        type: string
        default: ''

jobs:
  digest:
    name: Enviar digest de onboarding pendiente
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Enviar digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          DIGEST_TEST_TO: ${{ inputs.test_to }}
        run: node scripts/onboarding_digest.mjs ${{ inputs.dry_run == true && '--dry-run' || '' }}
